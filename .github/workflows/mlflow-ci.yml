name: MLflow CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - "MLProject/**"
      - ".github/workflows/mlflow-ci.yml"
  pull_request:
    paths:
      - "MLProject/**"
      - ".github/workflows/mlflow-ci.yml"
  workflow_dispatch:

env:
  PROJECT_DIR: MLProject
  MLFLOW_TRACKING_URI: file://${{ github.workspace }}/mlruns
  DOCKER_IMAGE_NAME: customer-churn-mlflow

jobs:
  retrain-and-build:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "${PROJECT_DIR}/requirements.txt"

      - name: Run MLflow Project retraining
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          mlflow run . --env-manager local

      - name: Upload MLflow run and model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: customer-churn-mlflow-artifacts
          path: |
            mlruns
            ${{ env.PROJECT_DIR }}/outputs
          if-no-files-found: error

      - name: Build Docker image from MLflow model
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          IMAGE_TAG="${DOCKERHUB_USERNAME:-local}/${DOCKER_IMAGE_NAME}:${GITHUB_SHA}"
          mlflow models build-docker -m outputs/model -n "${IMAGE_TAG}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "${GITHUB_ENV}"

      - name: Login to Docker Hub
        if: ${{ github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        if: ${{ github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        run: |
          docker tag "${IMAGE_TAG}" "${DOCKERHUB_USERNAME}/${DOCKER_IMAGE_NAME}:latest"
          docker push "${IMAGE_TAG}"
          docker push "${DOCKERHUB_USERNAME}/${DOCKER_IMAGE_NAME}:latest"
